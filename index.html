<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bikram-sambat-js"></script>

<style>
body {
    margin:0;
    background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
    font-family:'Segoe UI';
}

/* HEADER */
.header {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
}

.header img {
    height:70px;
    margin-right:15px;
}

.header-text {
    text-align:center;
    line-height:1.4;
}

.header-text strong {
    font-size:18px;
}

/* DASHBOARD */
.dashboard {
    padding:10px;
    height: calc(100vh - 110px);
}

.panel {
    background:white;
    border-radius:15px;
    padding:12px;
    height:100%;
    display:flex;
    flex-direction:column;
}

.table-container {
    flex:1;
    overflow-y:auto;
}

.table {
    background:#1e293b;
    color:#e2e8f0;
    font-size:13px;
}
.table thead {
    position:sticky;
    top:0;
    background:#0f172a;
}
.table tbody tr:nth-child(odd){ background:#334155; }
.table tbody tr:nth-child(even){ background:#475569; }

.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

.section-title {
    padding:8px;
    border-radius:8px;
    font-weight:600;
    margin-bottom:8px;
}
.section-pending { background:#fbbf24; }
.section-completed { background:#4ade80; }

#chartSection { height:300px; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<!-- Embedded Base64 Logo -->
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." />

<div class="header-text">
    <div>नेपाल सरकार</div>
    <div>भूमि व्यवस्था, सहकारी तथा गरिबी निवारण मन्त्रालय</div>
    <div>नापी विभाग</div>
    <strong>नापी कार्यालय डिल्लीबजार, काठमाडौँ</strong>
    <div id="liveClock"></div>
</div>

</div>

<div class="container-fluid dashboard">
<div class="row h-100">

<!-- LEFT -->
<div class="col-md-6">
<div class="panel">

<h6 class="section-title section-pending">
📌 Pending (<span id="pendingCount"></span>)
</h6>

<div class="table-container" id="pendingTable"></div>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-6">
<div class="panel">

<div id="chartSection">
<h6>📊 Files by Employee</h6>
<canvas id="employeeChart"></canvas>
</div>

<hr>

<h6 class="section-title section-completed">
Completed (<span id="completedCount"></span>)
</h6>

<div class="table-container" id="completedTable"></div>

</div>
</div>

</div>
</div>

<script>

const SHEET_ID="1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData=[], chart;

/* CLOCK */
setInterval(()=>{
const now=new Date();
const bs=NepaliDate.fromAD(now);
liveClock.innerHTML=`${bs.format('YYYY/MM/DD')}<br>${now.toLocaleTimeString()}`;
},1000);

/* PARSE BS DATE */
function parseBS(dateStr){
if(!dateStr) return 0;
const parts=dateStr.split('/');
return new Date(parts[0],parts[1]-1,parts[2]).getTime();
}

/* CSV */
function parseCSV(t){
const r=t.split("\n").map(x=>x.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
const h=r[0];
return r.slice(1).map(row=>{
let o={};
h.forEach((k,i)=>o[k.trim()]=(row[i]||"").replace(/"/g,''));
return o;
});
}

/* LOAD */
function load(){
fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
.then(r=>r.text())
.then(csv=>{
fullData=parseCSV(csv);
render();
});
}

/* STATUS */
function getStatus(r){
const s=(r['कामको अवस्था']||'').toLowerCase();
if(s.includes('pend')) return 'pending';
if(s.includes('comp')) return 'complete';
}

/* TABLE */
function buildTable(d){

// SORT by BS date DESC
d.sort((a,b)=>parseBS(b['दर्ता मिति']) - parseBS(a['दर्ता मिति']));

let html=`<table class="table"><thead><tr>
<th>दर्ता नं.</th>
<th>दर्ता मिति</th>
<th>विषय</th>
<th>नाम</th>
<th>कर्मचारी</th>
<th>स्थिति</th>
</tr></thead><tbody>`;

d.forEach(r=>{
const st=getStatus(r);
const badge=st==='pending'
?'<span class="badge badge-pending">Pending</span>'
:'<span class="badge badge-complete">Done</span>';

html+=`<tr>
<td>${r['निवेदन दर्ता नं.']||''}</td>
<td>${r['दर्ता मिति']||''}</td>
<td>${r['विषय']||''}</td>
<td>${r['निवेदकको नाम थर']||''}</td>
<td>${r['फाटवाला कर्मचारी']||''}</td>
<td>${badge}</td>
</tr>`;
});

return html+"</tbody></table>";
}

/* CHART */
function renderChart(data){
if(chart) chart.destroy();

const emp={};
data.forEach(r=>{
const e=r['फाटवाला कर्मचारी']||'Unknown';
if(!emp[e]) emp[e]={p:0,c:0};
const st=getStatus(r);
if(st==='pending') emp[e].p++;
if(st==='complete') emp[e].c++;
});

const labels=Object.keys(emp);

chart=new Chart(employeeChart,{
type:'bar',
data:{
labels,
datasets:[
{ label:'Pending', data:labels.map(e=>emp[e].p), backgroundColor:'#f59e0b', stack:'total' },
{ label:'Completed', data:labels.map(e=>emp[e].c), backgroundColor:'#16a34a', stack:'total' }
]
},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{ x:{stacked:true}, y:{stacked:true,beginAtZero:true} }
}
});
}

/* RENDER */
function render(){
const p=fullData.filter(r=>getStatus(r)==='pending');
const c=fullData.filter(r=>getStatus(r)==='complete');

pendingTable.innerHTML=buildTable(p);
completedTable.innerHTML=buildTable(c);

pendingCount.textContent=p.length;
completedCount.textContent=c.length;

renderChart(fullData);
}

/* INIT */
load();
setInterval(load,120000);

</script>

</body>
</html>
