<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Office Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */
body {
    background: linear-gradient(135deg, #667eea, #43cea2);
    font-family: 'Segoe UI';
}

/* Header */
.header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: white;
    padding: 12px 18px;
    border-radius: 12px;
    margin-bottom: 15px;
}

/* Clock */
#liveClock {
    font-size: 0.85rem;
    text-align: right;
    font-weight: 600;
}

/* Main container */
.container-box {
    background: linear-gradient(135deg, #ffffff, #f0f9ff);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* Counters */
.counter-card {
    text-align:center;
    padding:15px;
    border-radius:12px;
    transition:0.3s;
}
.counter-card:hover {
    transform: translateY(-4px);
}
.big-number {
    font-size:2rem;
    font-weight:800;
}

/* Counter colors */
.bg-pending { background: linear-gradient(135deg,#fbbf24,#f59e0b); }
.bg-complete { background: linear-gradient(135deg,#34d399,#059669); }
.bg-total { background: linear-gradient(135deg,#60a5fa,#2563eb); }

/* Table */
.table {
    border-radius: 10px;
    overflow: hidden;
}
.table thead {
    background: linear-gradient(135deg, #1f2937, #111827);
    color: white;
}
.table tbody tr:nth-child(odd) {
    background-color: #f1f5f9;
}
.table tbody tr:nth-child(even) {
    background-color: #e2e8f0;
}
.table tbody tr:hover {
    background: #bae6fd !important;
    transition: 0.2s;
}

/* Badges */
.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

</style>
</head>

<body>

<div class="container mt-4">

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">नापी कार्यालय डिल्लीबजार</h5>
        <small>File Tracking Dashboard</small>
    </div>
    <div id="liveClock"></div>
</div>

<div class="container-box">

<!-- FILTER -->
<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" id="search" class="form-control" placeholder="🔍 Search files...">
    </div>
    <div class="col-md-4">
        <select id="employeeFilter" class="form-select">
            <option value="">👨‍💼 All Employees</option>
        </select>
    </div>
    <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<!-- COUNTERS -->
<div id="counters" class="row g-3 mb-4"></div>

<h5 class="text-warning">📌 Pending (<span id="pendingCount"></span>)</h5>
<div id="pendingTable"></div>

<hr>

<h5 class="text-success">✅ Completed (<span id="completedCount"></span>)</h5>
<div id="completedTable"></div>

</div>
</div>

<script>

const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData = [];

/* Clock */
function updateClock(){
    const now = new Date();
    const date = `${2083}/${now.getMonth()+1}/${now.getDate()}`;
    const time = now.toLocaleTimeString('en-US',{hour12:true});

    document.getElementById("liveClock").innerHTML =
        `${date}<br>${time}`;
}
setInterval(updateClock,1000);
updateClock();

/* CSV parser */
function parseCSV(text){
    const rows = text.split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const headers = rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = (r[i] || "").replace(/"/g,''));
        return obj;
    });
}

/* Filters */
function applyFilters(data){
    const keyword = document.getElementById("search").value.toLowerCase();
    const emp = document.getElementById("employeeFilter").value;

    return data.filter(r=>{
        const textMatch = Object.values(r).some(v =>
            String(v).toLowerCase().includes(keyword)
        );
        const empMatch = !emp || r['फाटवाला कर्मचारी'] === emp;
        return textMatch && empMatch;
    });
}

/* Table */
function buildTable(data){
    let html = `<table class="table table-striped table-hover">
    <thead>
    <tr>
    <th>दर्ता नं.</th><th>विषय</th><th>नाम</th><th>कर्मचारी</th><th>स्थिति</th>
    </tr></thead><tbody>`;

    data.forEach(r=>{
        const s = String(r['कामको अवस्था']||'').toLowerCase();

        const badge = s.includes('pend')
            ? '<span class="badge badge-pending">Pending</span>'
            : '<span class="badge badge-complete">Complete</span>';

        html += `<tr>
        <td>${r['निवेदन दर्ता नं.']||''}</td>
        <td>${r['विषय']||''}</td>
        <td>${r['निवेदकको नाम थर']||''}</td>
        <td>${r['फाटवाला कर्मचारी']||''}</td>
        <td>${badge}</td>
        </tr>`;
    });

    html += "</tbody></table>";
    return html;
}

/* Load */
function load(){
    fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
    .then(res=>res.text())
    .then(csv=>{
        fullData = parseCSV(csv);

        const employees = [...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];

        document.getElementById("employeeFilter").innerHTML =
            `<option value="">👨‍💼 All Employees</option>` +
            employees.map(e=>`<option>${e}</option>`).join("");

        render();
    });
}

/* Render */
function render(){
    const data = applyFilters(fullData);

    const pending = data.filter(r =>
        String(r['कामको अवस्था']||'').toLowerCase().includes('pend')
    );

    const completed = data.filter(r =>
        String(r['कामको अवस्था']||'').toLowerCase().includes('comp')
    );

    document.getElementById("pendingCount").textContent = pending.length;
    document.getElementById("completedCount").textContent = completed.length;

    document.getElementById("pendingTable").innerHTML = buildTable(pending);
    document.getElementById("completedTable").innerHTML = buildTable(completed);

    document.getElementById("counters").innerHTML = `
    <div class="col-md-4">
        <div class="counter-card bg-pending text-dark">
            Pending<br><div class="big-number">${pending.length}</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="counter-card bg-complete text-white">
            Completed<br><div class="big-number">${completed.length}</div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="counter-card bg-total text-white">
            Total<br><div class="big-number">${data.length}</div>
        </div>
    </div>`;
}

/* Export */
function exportExcel(){
    let csv = "";
    fullData.forEach(r=>{
        csv += Object.values(r).join(",") + "\n";
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "files.csv";
    a.click();
}

/* Events */
document.getElementById("search").addEventListener("input",render);
document.getElementById("employeeFilter").addEventListener("change",render);

/* Init */
load();
setInterval(load,120000);

</script>

</body>
</html>
