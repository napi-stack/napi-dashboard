<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Napi Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bikram-sambat-js"></script>

<style>

body {
    background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
    font-family:'Segoe UI';
}

.header {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

#liveClock {
    text-align:right;
    font-size:0.9rem;
}

.container-box {
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* headings */
.pending-title {
    background: linear-gradient(135deg,#fbbf24,#f59e0b);
    padding:8px 12px;
    border-radius:8px;
    font-weight:700;
}

.completed-title {
    background: linear-gradient(135deg,#34d399,#059669);
    padding:8px 12px;
    border-radius:8px;
    color:white;
    font-weight:700;
}

.today-title {
    background: linear-gradient(135deg,#60a5fa,#2563eb);
    padding:8px 12px;
    border-radius:8px;
    color:white;
    font-weight:700;
}

/* table */
.table-container {
    max-height:320px;
    overflow-y:auto;
}

thead {
    position:sticky;
    top:0;
    background:#111827;
    color:white;
}

/* badges */
.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

/* counters */
.counter-card {
    text-align:center;
    padding:15px;
    border-radius:10px;
    color:white;
}

.bg-pending { background:#f59e0b; }
.bg-complete { background:#16a34a; }
.bg-total { background:#2563eb; }

.big-number {
    font-size:2rem;
    font-weight:800;
}

</style>
</head>

<body>

<div class="container mt-4">

<div class="header d-flex justify-content-between">
    <div>
        <h5>नापी कार्यालय डिल्लीबजार</h5>
        <small>Smart File Tracking System</small>
    </div>
    <div id="liveClock"></div>
</div>

<div class="container-box">

<!-- FILTER -->
<div class="row mb-3">
    <div class="col-md-5">
        <input id="search" class="form-control" placeholder="🔍 Search">
    </div>
    <div class="col-md-3">
        <select id="employeeFilter" class="form-select"></select>
    </div>
    <div class="col-md-4 d-flex gap-2">
        <button class="btn btn-primary w-100" onclick="load()">🔄</button>
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<!-- COUNTERS -->
<div id="counters" class="row g-3 mb-4"></div>

<!-- CHART -->
<div class="mb-4">
    <canvas id="employeeChart"></canvas>
</div>

<!-- TODAY -->
<h5 class="today-title">🆕 आजका नयाँ दर्ता (<span id="todayCount"></span>)</h5>
<div class="table-container" id="todayTable"></div>

<hr>

<!-- PENDING -->
<h5 class="pending-title">📌 Pending (<span id="pendingCount"></span>)</h5>
<div class="table-container" id="pendingTable"></div>

<hr>

<!-- COMPLETED -->
<h5 class="completed-title">✅ Completed (<span id="completedCount"></span>)</h5>
<div class="table-container" id="completedTable"></div>

</div>
</div>

<script>

const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData = [];
let lastLoad = 0;

/* clock */
function updateClock(){
    const now = new Date();
    const bs = NepaliDate.fromAD(now);
    document.getElementById("liveClock").innerHTML =
        `${bs.format('YYYY/MM/DD')}<br>${now.toLocaleTimeString()}`;
}
setInterval(updateClock,1000);

/* csv */
function parseCSV(text){
    const rows = text.split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const headers = rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = (r[i]||"").replace(/"/g,''));
        return obj;
    });
}

/* load */
function load(){
    const now = Date.now();
    if(now - lastLoad < 60000) return;
    lastLoad = now;

    fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
    .then(res=>res.text())
    .then(csv=>{
        fullData = parseCSV(csv);
        setupFilters();
        render();
    });
}

/* filters */
function setupFilters(){
    const empList = [...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];
    document.getElementById("employeeFilter").innerHTML =
        `<option value="">All Employees</option>` +
        empList.map(e=>`<option>${e}</option>`).join("");
}

function applyFilters(){
    const keyword = document.getElementById("search").value.toLowerCase();
    const emp = document.getElementById("employeeFilter").value;

    return fullData.filter(r=>{
        const textMatch =
            (r['निवेदन दर्ता नं.']||'').toLowerCase().includes(keyword) ||
            (r['विषय']||'').toLowerCase().includes(keyword) ||
            (r['निवेदकको नाम थर']||'').toLowerCase().includes(keyword);

        const empMatch = !emp || r['फाटवाला कर्मचारी'] === emp;

        return textMatch && empMatch;
    });
}

/* status */
function getStatus(r){
    const s = (r['कामको अवस्था']||'').toLowerCase();
    if(s.includes('pend') || s.includes('पेन्ड')) return 'pending';
    if(s.includes('comp') || s.includes('सम्प')) return 'complete';
    return '';
}

/* table */
function buildTable(data){
    let html = `<table class="table table-hover">
    <thead><tr>
    <th>दर्ता नं.</th>
    <th>दर्ता मिति</th>
    <th>विषय</th>
    <th>नाम</th>
    <th>कर्मचारी</th>
    <th>स्थिति</th>
    </tr></thead><tbody>`;

    data.forEach(r=>{
        const status = getStatus(r);
        const badge = status==='pending'
            ? '<span class="badge badge-pending">Pending</span>'
            : '<span class="badge badge-complete">Complete</span>';

        html += `<tr>
        <td>${r['निवेदन दर्ता नं.']||''}</td>
        <td>${r['दर्ता मिति']||''}</td>
        <td>${r['विषय']||''}</td>
        <td>${r['निवेदकको नाम थर']||''}</td>
        <td>${r['फाटवाला कर्मचारी']||''}</td>
        <td>${badge}</td>
        </tr>`;
    });

    return html + "</tbody></table>";
}

/* chart */
let employeeChart;

function renderChart(data){
    if(employeeChart) employeeChart.destroy();

    const empCount = {};
    data.forEach(r=>{
        const emp = r['फाटवाला कर्मचारी'] || 'Unknown';
        empCount[emp] = (empCount[emp]||0)+1;
    });

    employeeChart = new Chart(document.getElementById('employeeChart'), {
        type:'bar',
        data:{
            labels:Object.keys(empCount),
            datasets:[{
                label:'Files',
                data:Object.values(empCount),
                backgroundColor:'#2563eb'
            }]
        }
    });
}

/* render */
function render(){
    const data = applyFilters();

    const pending = data.filter(r=>getStatus(r)==='pending');
    const completed = data.filter(r=>getStatus(r)==='complete');

    const todayBS = NepaliDate.fromAD(new Date()).format('YYYY/MM/DD');
    const todayData = data.filter(r => (r['दर्ता मिति']||'') === todayBS);

    document.getElementById("todayCount").textContent = todayData.length;
    document.getElementById("pendingCount").textContent = pending.length;
    document.getElementById("completedCount").textContent = completed.length;

    document.getElementById("todayTable").innerHTML = buildTable(todayData);
    document.getElementById("pendingTable").innerHTML = buildTable(pending);
    document.getElementById("completedTable").innerHTML = buildTable(completed);

    document.getElementById("counters").innerHTML = `
    <div class="col-md-4"><div class="counter-card bg-pending">Pending<div class="big-number">${pending.length}</div></div></div>
    <div class="col-md-4"><div class="counter-card bg-complete">Completed<div class="big-number">${completed.length}</div></div></div>
    <div class="col-md-4"><div class="counter-card bg-total">Total<div class="big-number">${data.length}</div></div></div>
    `;

    renderChart(data);
}

/* export */
function exportExcel(){
    const headers = Object.keys(fullData[0]);
    let csv = headers.join(",")+"\n";

    fullData.forEach(r=>{
        csv += headers.map(h=>r[h]).join(",")+"\n";
    });

    const blob = new Blob([csv]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "files.csv";
    a.click();
}

/* events */
document.getElementById("search").addEventListener("input",render);
document.getElementById("employeeFilter").addEventListener("change",render);

/* init */
load();
setInterval(load,120000);

</script>

</body>
</html>
