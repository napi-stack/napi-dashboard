<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bikram-sambat-js"></script>

<style>

body {
    margin:0;
    background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
    font-family:'Segoe UI';
}

/* Header */
.header {
    height:70px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    padding:10px 20px;
}

/* Layout */
.dashboard {
    padding:10px;
    height: calc(100vh - 70px);
}

.row.h-100 { height:100%; }

.col-md-6 {
    display:flex;
    flex-direction:column;
}

/* Panels */
.panel {
    flex:1;
    min-height:0;
    background:white;
    border-radius:15px;
    padding:12px;
    display:flex;
    flex-direction:column;
}

/* Counters */
.counter-card {
    text-align:center;
    padding:10px;
    border-radius:10px;
    color:white;
}
.big-number { font-size:2rem; font-weight:800; }

.bg-pending { background:#f59e0b; }
.bg-complete { background:#16a34a; }
.bg-total { background:#2563eb; }

/* Tables */
.table-container {
    flex:1;
    overflow-y:auto;
    min-height:0;
}

.table {
    background:#1e293b;
    color:#e2e8f0;
}

.table thead {
    position:sticky;
    top:0;
    background:#0f172a;
    color:white;
}

.table tbody tr:nth-child(odd){ background:#334155; }
.table tbody tr:nth-child(even){ background:#475569; }
.table tbody tr:hover { background:#0ea5e9 !important; }

.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

/* Chart */
#chartSection {
    height:300px;
    display:flex;
    flex-direction:column;
}

#employeeChart {
    flex:1;
}

</style>
</head>

<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">नापी कार्यालय डिल्लीबजार</h5>
        <small>Smart File Dashboard</small>
    </div>
    <div id="liveClock"></div>
</div>

<div class="container-fluid dashboard">
<div class="row h-100">

<!-- LEFT -->
<div class="col-md-6">
<div class="panel">

<div id="counters" class="row g-2 mb-2"></div>

<h6 class="text-warning">📌 Pending (<span id="pendingCount"></span>)</h6>
<div class="table-container" id="pendingTable"></div>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-6">
<div class="panel">

<div id="chartSection">
<h6>📊 Files by Employee</h6>
<canvas id="employeeChart"></canvas>
</div>

<hr>

<h6 class="text-success">Completed (<span id="completedCount"></span>)</h6>
<div class="table-container" id="completedTable"></div>

</div>
</div>

</div>
</div>

<script>

const SHEET_ID="1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData=[], chart;

/* CLOCK */
function updateClock(){
    const now=new Date();
    const bs=NepaliDate.fromAD(now);
    liveClock.innerHTML=`${bs.format('YYYY/MM/DD')}<br>${now.toLocaleTimeString()}`;
}
setInterval(updateClock,1000);

/* CSV */
function parseCSV(t){
    const r=t.split("\n").map(x=>x.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const h=r[0];
    return r.slice(1).map(row=>{
        let o={};
        h.forEach((k,i)=>o[k.trim()]=(row[i]||"").replace(/"/g,''));
        return o;
    });
}

/* LOAD */
function load(){
fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
.then(r=>r.text())
.then(csv=>{
    fullData=parseCSV(csv);
    render();
});
}

/* STATUS */
function getStatus(r){
    const s=(r['कामको अवस्था']||'').toLowerCase();
    if(s.includes('pend')) return 'pending';
    if(s.includes('comp')) return 'complete';
}

/* TABLE */
function buildTable(d){
let html=`<table class="table"><thead><tr>
<th>दर्ता नं.</th><th>विषय</th><th>नाम</th><th>कर्मचारी</th><th>स्थिति</th>
</tr></thead><tbody>`;
d.forEach(r=>{
const st=getStatus(r);
const badge=st==='pending'
?'<span class="badge badge-pending">Pending</span>'
:'<span class="badge badge-complete">Done</span>';
html+=`<tr>
<td>${r['निवेदन दर्ता नं.']||''}</td>
<td>${r['विषय']||''}</td>
<td>${r['निवेदकको नाम थर']||''}</td>
<td>${r['फाटवाला कर्मचारी']||''}</td>
<td>${badge}</td>
</tr>`;
});
return html+"</tbody></table>";
}

/* CHART (STACKED) */
function renderChart(data){
if(chart) chart.destroy();

const employees={};
data.forEach(r=>{
    const e=r['फाटवाला कर्मचारी']||'Unknown';
    if(!employees[e]) employees[e]={pending:0,complete:0};
    const st=getStatus(r);
    if(st==='pending') employees[e].pending++;
    if(st==='complete') employees[e].complete++;
});

const labels=Object.keys(employees);

chart=new Chart(employeeChart,{
type:'bar',
data:{
labels:labels,
datasets:[
{label:'Pending',data:labels.map(e=>employees[e].pending),backgroundColor:'#f59e0b',stack:'s'},
{label:'Completed',data:labels.map(e=>employees[e].complete),backgroundColor:'#16a34a',stack:'s'}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{position:'top'}},
scales:{x:{stacked:true},y:{stacked:true,beginAtZero:true}}
}
});
}

/* COUNTER ANIMATION */
function animateValue(el, start, end, duration){
let startTime=null;
function step(timestamp){
if(!startTime) startTime=timestamp;
const progress=Math.min((timestamp-startTime)/duration,1);
el.textContent=Math.floor(progress*(end-start)+start);
if(progress<1) requestAnimationFrame(step);
}
requestAnimationFrame(step);
}

/* RENDER */
function render(){
const p=fullData.filter(r=>getStatus(r)==='pending');
const c=fullData.filter(r=>getStatus(r)==='complete');

pendingTable.innerHTML=buildTable(p);
completedTable.innerHTML=buildTable(c);

pendingCount.textContent=p.length;
completedCount.textContent=c.length;

counters.innerHTML=`
<div class="col-4"><div class="counter-card bg-pending">Pending<div id="pVal" class="big-number">0</div></div></div>
<div class="col-4"><div class="counter-card bg-complete">Done<div id="cVal" class="big-number">0</div></div></div>
<div class="col-4"><div class="counter-card bg-total">Total<div id="tVal" class="big-number">0</div></div></div>
`;

animateValue(document.getElementById("pVal"),0,p.length,800);
animateValue(document.getElementById("cVal"),0,c.length,800);
animateValue(document.getElementById("tVal"),0,fullData.length,800);

renderChart(fullData);
}

/* INIT */
load();
setInterval(load,120000);

</script>

</body>
</html>
