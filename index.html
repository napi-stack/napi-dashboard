<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepali Calendar Picker</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Nepali Date Picker -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nepali-date-picker@2.0.2/dist/nepaliDatePicker.min.css">

<style>
body {
    background: linear-gradient(135deg,#667eea,#43cea2);
    font-family:'Segoe UI';
}

.container {
    margin-top:50px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align:center;
    margin-bottom:20px;
}

.result-box {
    margin-top:20px;
    padding:15px;
    background:#f1f5f9;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🇳🇵 Nepali Date Picker (BS)</h2>

<div class="row">
    <div class="col-md-6">
        <label>📅 Select Nepali Date (BS)</label>
        <input type="text" id="nepaliDate" class="form-control">
    </div>

    <div class="col-md-6">
        <label>📆 Converted AD Date</label>
        <input type="text" id="englishDate" class="form-control" readonly>
    </div>
</div>

<div class="result-box mt-3">
    <strong>Selected BS Date:</strong> <span id="bsDisplay">-</span><br>
    <strong>Equivalent AD Date:</strong> <span id="adDisplay">-</span>
</div>

</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nepali-date-picker@2.0.2/dist/nepaliDatePicker.min.js"></script>

<script>

// Initialize Nepali Date Picker
$('#nepaliDate').nepaliDatePicker({
    ndpYear: true,
    ndpMonth: true,
    ndpYearCount: 20
});

// On date select
$('#nepaliDate').on('dateChange', function(evt) {
    const bsDate = $(this).val();

    $('#bsDisplay').text(bsDate);

    // Convert BS → AD (basic built-in conversion)
    const adDate = NepaliFunctions.BS2AD(bsDate, "YYYY-MM-DD");

    $('#englishDate').val(adDate);
    $('#adDisplay').text(adDate);
});

</script>

</body>
</html>
