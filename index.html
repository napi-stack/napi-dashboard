<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napi Office Dillibazaar - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .header {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6);
            color: white;
            padding: 2rem 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .counter-card {
            text-align: center;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .counter-card:hover {
            transform: translateY(-10px);
        }
        .big-number {
            font-size: 4.5rem;
            font-weight: 800;
            line-height: 1;
        }
        .table th {
            background-color: #1e3a8a;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table tr:hover {
            background-color: #f0f8ff !important;
            transform: scale(1.02);
            transition: all 0.2s;
        }
        .search-box {
            max-width: 500px;
            margin: 20px auto;
        }
        .status-pending { color: #d97706; }
        .status-complete { color: #16a34a; }
    </style>
</head>
<body>
    <header class="header text-center">
        <h1 class="mb-1">नापी कार्यालय डिल्लीबजार</h1>
        <h2 class="h4">File Tracking Dashboard</h2>
    </header>

    <div class="container py-4">
        <div id="lastUpdated" class="text-center mb-4 text-muted"></div>

        <!-- Counters -->
        <div class="row g-4 mb-5" id="counters"></div>

        <!-- Search -->
        <div class="search-box">
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
                <input type="text" id="searchInput" class="form-control form-control-lg" 
                       placeholder="Search by File ID, Name, Subject or Staff..." onkeyup="filterTable()">
            </div>
        </div>

        <h3 class="text-warning mb-3"><i class="fas fa-clock"></i> Pending Files (<span id="pendingCount">0</span>)</h3>
        <div class="table-responsive mb-5" id="pendingTable"></div>

        <hr>

        <h3 class="text-success mb-3"><i class="fas fa-check-circle"></i> Completed Files (<span id="completedCount">0</span>)</h3>
        <div class="table-responsive" id="completedTable"></div>
    </div>

    <script>
        const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";

        function formatDate(value) {
            if (!value) return "";
            if (typeof value === 'number') {
                const date = new Date((value - 25569) * 86400 * 1000);
                return `${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
            }
            return String(value).trim();
        }

        async function loadDashboard() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
                const res = await fetch(url);
                const csv = await res.text();
                const wb = XLSX.read(csv, {type: 'string'});
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

                const pending = data.filter(r => String(r['कामको अवस्था'] || '').toLowerCase().includes('pend'));
                const completed = data.filter(r => String(r['कामको अवस्था'] || '').toLowerCase().includes('comp'));

                // Counters with icons
                document.getElementById('counters').innerHTML = `
                    <div class="col-md-4">
                        <div class="card counter-card bg-warning text-dark">
                            <div class="card-body">
                                <i class="fas fa-clock fa-2x mb-3"></i>
                                <h5>PENDING FILES</h5>
                                <div class="big-number">${pending.length}</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card counter-card bg-success text-white">
                            <div class="card-body">
                                <i class="fas fa-check-circle fa-2x mb-3"></i>
                                <h5>COMPLETED FILES</h5>
                                <div class="big-number">${completed.length}</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card counter-card bg-primary text-white">
                            <div class="card-body">
                                <i class="fas fa-folder fa-2x mb-3"></i>
                                <h5>TOTAL FILES</h5>
                                <div class="big-number">${data.length}</div>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('pendingCount').textContent = pending.length;
                document.getElementById('completedCount').textContent = completed.length;

                // Render Tables
                document.getElementById('pendingTable').innerHTML = createTable(pending, true);
                document.getElementById('completedTable').innerHTML = createTable(completed, false);

                document.getElementById('lastUpdated').innerHTML = 
                    `<i class="fas fa-sync"></i> Last updated: ${new Date().toLocaleString()}`;

            } catch(e) {
                console.error(e);
                document.getElementById('pendingTable').innerHTML = `<div class="alert alert-danger text-center">Unable to load data from Google Sheet</div>`;
            }
        }

        function createTable(rows, isPending) {
            if (rows.length === 0) return `<p class="text-muted">No files found.</p>`;
            
            let html = `<table class="table table-striped table-hover"><thead><tr>
                <th>निवेदन दर्ता नं.</th>
                <th>विषय</th>
                <th>निवेदकको नाम थर</th>
                <th>फाटवाला कर्मचारी</th>
                <th>दर्ता मिति</th>
            </tr></thead><tbody>`;
            
            rows.forEach(r => {
                html += `<tr>
                    <td><strong>${r['निवेदन दर्ता नं.'] || ''}</strong></td>
                    <td>${r['विषय'] || ''}</td>
                    <td>${r['निवेदकको नाम थर'] || ''}</td>
                    <td>${r['फाटवाला कर्मचारी'] || ''}</td>
                    <td>${formatDate(r['दर्ता मिति'])}</td>
                </tr>`;
            });
            html += `</tbody></table>`;
            return html;
        }

        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            // Simple refresh with filter (can be enhanced further)
            loadDashboard();
        }

        // Load data
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
