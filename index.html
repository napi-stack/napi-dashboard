<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Office Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #dbeafe, #f0fdf4);
    font-family: 'Segoe UI';
}

.container {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    position: relative;
}

/* 🔥 Top right clock */
#liveClock {
    position: absolute;
    top: 15px;
    right: 20px;
    font-weight: 600;
    color: #1e3a8a;
    text-align: right;
}

.counter-card {
    text-align:center;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}
.counter-card:hover {
    transform: translateY(-5px);
}

.big-number {
    font-size:3rem;
    font-weight:800;
}

.table tbody tr:hover {
    background:#eef2ff;
    cursor:pointer;
}

.badge-pending { background:#facc15; }
.badge-complete { background:#22c55e; }

.overdue {
    background:#ffe5e5 !important;
}
</style>
</head>

<body>
<div class="container mt-4">

<!-- 🔥 LIVE CLOCK -->
<div id="liveClock"></div>

<h2 class="text-center text-primary">नापी कार्यालय डिल्लीबजार</h2>
<h5 class="text-center text-muted mb-4">Interactive File Dashboard</h5>

<!-- FILTER -->
<div class="row mb-3">
    <div class="col-md-6">
        <input type="text" id="search" class="form-control" placeholder="🔍 Search files...">
    </div>
    <div class="col-md-4">
        <select id="employeeFilter" class="form-select">
            <option value="">👨‍💼 All Employees</option>
        </select>
    </div>
    <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<div id="counters" class="row g-3 mb-4"></div>

<h5 class="text-warning">📌 Pending (<span id="pendingCount"></span>)</h5>
<div id="pendingTable"></div>

<hr>

<h5 class="text-success">✅ Completed (<span id="completedCount"></span>)</h5>
<div id="completedTable"></div>

</div>

<script>

const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData = [];

// 🔥 LIVE CLOCK FUNCTION
function updateClock(){
    const now = new Date();

    const date = now.toLocaleDateString('en-GB');
    const time = now.toLocaleTimeString('en-US', {hour12:true});

    document.getElementById("liveClock").innerHTML =
        `📅 ${date}<br>⏰ ${time}`;
}
setInterval(updateClock,1000);
updateClock();

// CSV parser
function parseCSV(text){
    const rows = text.split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const headers = rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = (r[i] || "").replace(/"/g,''));
        return obj;
    });
}

// filter
function applyFilters(data){
    const keyword = document.getElementById("search").value.toLowerCase();
    const emp = document.getElementById("employeeFilter").value;

    return data.filter(r=>{
        const textMatch = Object.values(r).some(v =>
            String(v).toLowerCase().includes(keyword)
        );
        const empMatch = !emp || r['फाटवाला कर्मचारी'] === emp;

        return textMatch && empMatch;
    });
}

// table
function buildTable(data, type){
    let html = `<table class="table table-striped table-hover">
    <thead class="${type==='pending'?'table-warning':'table-success'}">
    <tr>
    <th>दर्ता नं.</th><th>विषय</th><th>नाम</th><th>कर्मचारी</th><th>स्थिति</th>
    </tr></thead><tbody>`;

    data.forEach(r=>{
        const s = String(r['कामको अवस्था']||'').toLowerCase();

        const badge = s.includes('pend')
            ? '<span class="badge badge-pending">Pending</span>'
            : '<span class="badge badge-complete">Complete</span>';

        html += `<tr>
        <td>${r['निवेदन दर्ता नं.']||''}</td>
        <td>${r['विषय']||''}</td>
        <td>${r['निवेदकको नाम थर']||''}</td>
        <td>${r['फाटवाला कर्मचारी']||''}</td>
        <td>${badge}</td>
        </tr>`;
    });

    html += "</tbody></table>";
    return html;
}

// load
function load(){
    fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
    .then(res=>res.text())
    .then(csv=>{
        fullData = parseCSV(csv);

        const employees = [...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];

        document.getElementById("employeeFilter").innerHTML =
            `<option value="">👨‍💼 All Employees</option>` +
            employees.map(e=>`<option>${e}</option>`).join("");

        render();
    });
}

// render
function render(){
    const data = applyFilters(fullData);

    const pending = data.filter(r =>
        String(r['कामको अवस्था']||'').toLowerCase().includes('pend')
    );

    const completed = data.filter(r =>
        String(r['कामको अवस्था']||'').toLowerCase().includes('comp')
    );

    document.getElementById("pendingCount").textContent = pending.length;
    document.getElementById("completedCount").textContent = completed.length;

    document.getElementById("pendingTable").innerHTML = buildTable(pending,'pending');
    document.getElementById("completedTable").innerHTML = buildTable(completed,'completed');

    document.getElementById("counters").innerHTML = `
    <div class="col-md-4"><div class="card bg-warning counter-card">Pending<div class="big-number">${pending.length}</div></div></div>
    <div class="col-md-4"><div class="card bg-success text-white counter-card">Completed<div class="big-number">${completed.length}</div></div></div>
    <div class="col-md-4"><div class="card bg-info text-white counter-card">Total<div class="big-number">${data.length}</div></div></div>
    `;
}

// export
function exportExcel(){
    let csv = "";
    fullData.forEach(r=>{
        csv += Object.values(r).join(",") + "\n";
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "files.csv";
    a.click();
}

// events
document.getElementById("search").addEventListener("input",render);
document.getElementById("employeeFilter").addEventListener("change",render);

// init
load();
setInterval(load,120000);

</script>
</body>
</html>
