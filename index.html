<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Office Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

/* 🌈 DARK MODERN BACKGROUND */
body{
    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: "Segoe UI";
    color: #e5e7eb;
}

/* HEADER */
.header{
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
    padding:12px 18px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* MAIN BOX */
.container-box{
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:20px;
}

/* INPUTS */
.form-control, .form-select{
    background:#0b1220;
    border:1px solid #1f2937;
    color:white;
}

/* CARDS */
.counter-card{
    border-radius:14px;
    padding:18px;
    text-align:center;
    font-weight:600;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
.counter-card:hover{ transform:translateY(-5px); }

.big-number{ font-size:2rem; font-weight:800; }

/* COLORS */
.bg-pending{ background: linear-gradient(135deg,#f59e0b,#f97316); }
.bg-complete{ background: linear-gradient(135deg,#10b981,#059669); }
.bg-total{ background: linear-gradient(135deg,#3b82f6,#1d4ed8); }

/* TABLE DARK */
.table{
    color:#e5e7eb;
    border-radius:12px;
    overflow:hidden;
}
.table thead{
    background:#111827;
    color:white;
}
.table tbody tr{
    background:#0b1220;
}
.table tbody tr:nth-child(even){
    background:#0f172a;
}
.table tbody tr:hover{
    background:#1f2937;
}

/* BADGES */
.badge{
    padding:6px 10px;
    border-radius:20px;
}
.badge-pending{ background:#f59e0b; }
.badge-complete{ background:#10b981; }

/* TITLE */
h5{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container mt-4">

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center mb-3">
    <div>
        <h5 class="mb-0">नापी कार्यालय डिल्लीबजार</h5>
        <small>File Tracking Dashboard</small>
    </div>
    <div id="clock"></div>
</div>

<div class="container-box">

<!-- FILTER -->
<div class="row g-2 mb-3">
    <div class="col-md-6">
        <input id="search" class="form-control" placeholder="🔍 Search files...">
    </div>

    <div class="col-md-4">
        <select id="employeeFilter" class="form-select">
            <option value="">All Employees</option>
        </select>
    </div>

    <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportCSV()">⬇</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨</button>
    </div>
</div>

<!-- COUNTERS -->
<div class="row g-3 mb-3" id="counters"></div>

<h5>📌 Pending (<span id="pendingCount"></span>)</h5>
<div id="pendingTable"></div>

<h5 class="text-success">✅ Completed (<span id="completedCount"></span>)</h5>
<div id="completedTable"></div>

</div>
</div>

<script>

const FILE_URL = "files.xlsx"; // place in same folder
let fullData = [];
let selectedEmployee = "";

/* CLOCK */
setInterval(()=>{
    const d = new Date();
    document.getElementById("clock").innerHTML =
        d.toLocaleDateString() + "<br>" + d.toLocaleTimeString();
},1000);

/* SAFE HTML */
function esc(s){
    return String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* LOAD EXCEL */
async function load(){
    const res = await fetch(FILE_URL);
    const buf = await res.arrayBuffer();

    const wb = XLSX.read(buf,{type:"array"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    fullData = XLSX.utils.sheet_to_json(ws);

    const employees = [...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];

    const sel = document.getElementById("employeeFilter");
    sel.innerHTML = `<option value="">All Employees</option>` +
        employees.map(e=>`<option ${e===selectedEmployee?'selected':''}>${e}</option>`).join("");

    render();
}

/* FILTER */
function getFiltered(){
    const q = document.getElementById("search").value.toLowerCase();

    return fullData.filter(r=>{
        const text = Object.values(r).join(" ").toLowerCase();
        const empOk = !selectedEmployee || r['फाटवाला कर्मचारी']===selectedEmployee;
        return text.includes(q) && empOk;
    });
}

/* TABLE */
function table(data){
    return `
    <table class="table table-hover">
    <thead>
    <tr>
        <th>दर्ता नं.</th>
        <th>विषय</th>
        <th>नाम</th>
        <th>कर्मचारी</th>
        <th>स्थिति</th>
    </tr>
    </thead>
    <tbody>
    ${data.map(r=>{
        const st = String(r['कामको अवस्था']||"").toLowerCase();
        const badge = st.includes("comp")
            ? `<span class="badge badge-complete">Complete</span>`
            : `<span class="badge badge-pending">Pending</span>`;

        return `
        <tr>
            <td>${esc(r['निवेदन दर्ता नं.'])}</td>
            <td>${esc(r['विषय'])}</td>
            <td>${esc(r['निवेदकको नाम थर'])}</td>
            <td>${esc(r['फाटवाला कर्मचारी'])}</td>
            <td>${badge}</td>
        </tr>`;
    }).join("")}
    </tbody>
    </table>`;
}

/* RENDER */
function render(){
    const data = getFiltered();

    const pending = data.filter(r=>String(r['कामको अवस्था']||"").toLowerCase().includes("pend"));
    const completed = data.filter(r=>String(r['कामको अवस्था']||"").toLowerCase().includes("comp"));

    document.getElementById("pendingCount").textContent = pending.length;
    document.getElementById("completedCount").textContent = completed.length;

    document.getElementById("pendingTable").innerHTML = table(pending);
    document.getElementById("completedTable").innerHTML = table(completed);

    document.getElementById("counters").innerHTML = `
    <div class="col-md-4">
        <div class="counter-card bg-pending">Pending<br><div class="big-number">${pending.length}</div></div>
    </div>
    <div class="col-md-4">
        <div class="counter-card bg-complete">Completed<br><div class="big-number">${completed.length}</div></div>
    </div>
    <div class="col-md-4">
        <div class="counter-card bg-total">Total<br><div class="big-number">${data.length}</div></div>
    </div>`;
}

/* EXPORT */
function exportCSV(){
    let csv = fullData.map(r=>Object.values(r).join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "data.csv";
    a.click();
}

/* EVENTS */
document.getElementById("search").addEventListener("input",()=>setTimeout(render,200));

document.getElementById("employeeFilter").addEventListener("change",(e)=>{
    selectedEmployee = e.target.value;
    render();
});

/* INIT */
load();
setInterval(load,120000);

</script>

</body>
</html>
