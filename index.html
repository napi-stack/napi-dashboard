<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Office Dillibazaar - Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; font-family:'Segoe UI'; }
.counter-card { text-align:center; padding:20px; border-radius:12px; }
.big-number { font-size:3rem; font-weight:700; }
.overdue { background:#ffe5e5 !important; }
</style>
</head>

<body>
<div class="container py-4">

<h2 class="text-center text-primary">नापी कार्यालय डिल्लीबजार</h2>
<h5 class="text-center text-muted mb-4">File Tracking Dashboard</h5>

<!-- FILTERS -->
<div class="row mb-3 g-2">
    <div class="col-md-3">
        <input type="text" id="search" class="form-control" placeholder="Search...">
    </div>
    <div class="col-md-3">
        <select id="employeeFilter" class="form-select">
            <option value="">All Employees</option>
        </select>
    </div>
    <div class="col-md-2">
        <input type="date" id="startDate" class="form-control">
    </div>
    <div class="col-md-2">
        <input type="date" id="endDate" class="form-control">
    </div>
    <div class="col-md-2 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-secondary w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<div id="counters" class="row g-3 mb-4"></div>

<h5 class="text-warning">Pending (<span id="pendingCount"></span>)</h5>
<div id="pendingTable"></div>

<hr>

<h5 class="text-success">Completed (<span id="completedCount"></span>)</h5>
<div id="completedTable"></div>

</div>

<script>

const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
const SHEET_NAME = "Sheet1";

let fullData = [];

function parseCSV(text){
    const rows = text.split("\n").map(r => r.split(","));
    const headers = rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = r[i]);
        return obj;
    });
}

function formatDate(val){
    if(!val) return "";
    if(!isNaN(val)){
        const date = new Date((val-25569)*86400*1000);
        return date.toISOString().split("T")[0];
    }
    return val;
}

function isOverdue(dateStr){
    if(!dateStr) return false;
    const d = new Date(dateStr);
    const today = new Date();
    const diff = (today - d)/(1000*60*60*24);
    return diff > 7; // 7 days overdue
}

function applyFilters(data){
    const keyword = document.getElementById("search").value.toLowerCase();
    const emp = document.getElementById("employeeFilter").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    return data.filter(r=>{
        const textMatch = Object.values(r).some(v => String(v).toLowerCase().includes(keyword));
        const empMatch = !emp || r['फाटवाला कर्मचारी'] === emp;

        const d = formatDate(r['दर्ता मिति']);
        const dateMatch =
            (!start || d >= start) &&
            (!end || d <= end);

        return textMatch && empMatch && dateMatch;
    });
}

function buildTable(data, type){
    let html = `<table class="table table-striped table-hover">
    <thead class="${type==='pending'?'table-warning':'table-success'}">
    <tr>
    <th>दर्ता नं.</th><th>विषय</th><th>नाम</th><th>कर्मचारी</th><th>मिति</th>
    </tr></thead><tbody>`;

    data.forEach(r=>{
        const d = formatDate(r['दर्ता मिति']);
        const overdueClass = (type==='pending' && isOverdue(d)) ? "overdue":"";

        html += `<tr class="${overdueClass}">
        <td>${r['निवेदन दर्ता नं.']||''}</td>
        <td>${r['विषय']||''}</td>
        <td>${r['निवेदकको नाम थर']||''}</td>
        <td>${r['फाटवाला कर्मचारी']||''}</td>
        <td>${d}</td>
        </tr>`;
    });

    html += "</tbody></table>";
    return html;
}

function load(){

    fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`)
    .then(res=>res.text())
    .then(csv=>{
        fullData = parseCSV(csv);

        const employees = [...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];
        const select = document.getElementById("employeeFilter");
        select.innerHTML = `<option value="">All Employees</option>` +
            employees.map(e=>`<option>${e}</option>`).join("");

        render();
    });
}

function render(){
    const data = applyFilters(fullData);

    const pending = data.filter(r=>{
        const s = String(r['कामको अवस्था']||'').toLowerCase().trim();
        return s === 'pending';
    });

    const completed = data.filter(r=>{
        const s = String(r['कामको अवस्था']||'').toLowerCase().trim();
        return s === 'completed';
    });

    document.getElementById("pendingCount").textContent = pending.length;
    document.getElementById("completedCount").textContent = completed.length;

    document.getElementById("pendingTable").innerHTML = buildTable(pending,'pending');
    document.getElementById("completedTable").innerHTML = buildTable(completed,'completed');

    document.getElementById("counters").innerHTML = `
    <div class="col-md-4"><div class="card bg-warning counter-card">Pending<br><div class="big-number">${pending.length}</div></div></div>
    <div class="col-md-4"><div class="card bg-success text-white counter-card">Completed<br><div class="big-number">${completed.length}</div></div></div>
    <div class="col-md-4"><div class="card bg-info text-white counter-card">Total<br><div class="big-number">${data.length}</div></div></div>
    `;
}

function exportExcel(){
    let csv = "Data Export\n";
    fullData.forEach(r=>{
        csv += Object.values(r).join(",") + "\n";
    });

    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "files.csv";
    a.click();
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("employeeFilter").addEventListener("change",render);
document.getElementById("startDate").addEventListener("change",render);
document.getElementById("endDate").addEventListener("change",render);

load();
setInterval(load,120000);

</script>
</body>
</html>
