<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bikram-sambat-js"></script>

<style>

body {
    margin:0;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
    font-family:'Segoe UI';
}

.header {
    height:70px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    padding:10px 20px;
}

#liveClock {
    font-size:0.9rem;
    text-align:right;
}

.dashboard {
    height: calc(100vh - 70px);
    padding:15px;
}

.panel {
    background:white;
    border-radius:15px;
    padding:15px;
    height:100%;
    display:flex;
    flex-direction:column;
}

.counter-card {
    text-align:center;
    padding:10px;
    border-radius:10px;
    color:white;
}
.big-number { font-size:1.8rem; font-weight:800; }

.bg-pending { background:#f59e0b; }
.bg-complete { background:#16a34a; }
.bg-total { background:#2563eb; }

.table-container {
    flex:1;
    overflow:auto;
}

.table {
    background:#1e293b;
    color:#e2e8f0;
}

.table thead {
    position:sticky;
    top:0;
    background:#0f172a;
    color:white;
}

.table tbody tr:nth-child(odd){ background:#334155; }
.table tbody tr:nth-child(even){ background:#475569; }

.table tbody tr:hover {
    background:#0ea5e9 !important;
}

.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

</style>
</head>

<body>

<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">नापी कार्यालय डिल्लीबजार</h5>
        <small>Smart File Dashboard</small>
    </div>
    <div class="d-flex align-items-center gap-2">
        <div id="liveClock"></div>
        <button class="btn btn-light btn-sm" onclick="toggleSlideshow()">▶️</button>
    </div>
</div>

<div class="container-fluid dashboard">
<div class="row h-100">

<div class="col-md-8 h-100">
<div class="panel">

<div class="row mb-2">
    <div class="col-md-6">
        <input id="search" class="form-control" placeholder="🔍 Search">
    </div>
    <div class="col-md-3">
        <select id="employeeFilter" class="form-select"></select>
    </div>
    <div class="col-md-3 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<div id="counters" class="row g-2 mb-2"></div>

<div id="pendingSection">
<h6 class="text-warning">📌 Pending (<span id="pendingCount"></span>)</h6>
<div class="table-container" id="pendingTable"></div>
</div>

</div>
</div>

<div class="col-md-4 h-100">
<div class="panel">

<div id="chartSection">
<h6>📊 Files by Employee</h6>
<canvas id="employeeChart"></canvas>
</div>

<hr>

<div id="completedSection">
<h6 class="text-success">Completed (<span id="completedCount"></span>)</h6>
<div class="table-container" id="completedTable"></div>
</div>

</div>
</div>

</div>
</div>

<script>

const SHEET_ID="1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData=[], chart;

/* CLOCK */
function updateClock(){
    const now=new Date();
    const bs=NepaliDate.fromAD(now);
    liveClock.innerHTML=`${bs.format('YYYY/MM/DD')}<br>${now.toLocaleTimeString()}`;
}
setInterval(updateClock,1000);

/* DATE */
function formatDate(v){
    if(!v) return "";
    if(!isNaN(v)){
        return new Date((v-25569)*86400*1000).toLocaleDateString();
    }
    return v;
}

/* CSV */
function parseCSV(t){
    const r=t.split("\n").map(x=>x.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const h=r[0];
    return r.slice(1).map(row=>{
        let o={};
        h.forEach((k,i)=>o[k.trim()]=(row[i]||"").replace(/"/g,''));
        return o;
    });
}

/* LOAD */
function load(){
fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
.then(r=>r.text())
.then(csv=>{
    fullData=parseCSV(csv);
    setupFilters();
    render();
});
}

/* FILTER */
function setupFilters(){
    const e=[...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];
    employeeFilter.innerHTML=`<option value="">All</option>`+e.map(x=>`<option>${x}</option>`).join("");
}

function applyFilters(){
    const k=search.value.toLowerCase();
    const e=employeeFilter.value;
    return fullData.filter(r=>{
        const t=Object.values(r).some(v=>String(v).toLowerCase().includes(k));
        const m=!e||r['फाटवाला कर्मचारी']===e;
        return t&&m;
    });
}

/* STATUS */
function getStatus(r){
    const s=(r['कामको अवस्था']||'').toLowerCase();
    if(s.includes('pend')) return 'pending';
    if(s.includes('comp')) return 'complete';
}

/* TABLE */
function buildTable(d){
let html=`<table class="table"><thead><tr>
<th>दर्ता नं.</th><th>विषय</th><th>नाम</th><th>कर्मचारी</th><th>दर्ता मिति</th><th>स्थिति</th>
</tr></thead><tbody>`;
d.forEach(r=>{
const st=getStatus(r);
const badge=st==='pending'
?'<span class="badge badge-pending">Pending</span>'
:'<span class="badge badge-complete">Done</span>';
html+=`<tr>
<td>${r['निवेदन दर्ता नं.']||''}</td>
<td>${r['विषय']||''}</td>
<td>${r['निवेदकको नाम थर']||''}</td>
<td>${r['फाटवाला कर्मचारी']||''}</td>
<td>${formatDate(r['दर्ता मिति'])}</td>
<td>${badge}</td>
</tr>`;
});
return html+"</tbody></table>";
}

/* CHART */
function renderChart(data){
if(chart) chart.destroy();
const c={};
data.forEach(r=>{
const e=r['फाटवाला कर्मचारी']||'Unknown';
c[e]=(c[e]||0)+1;
});
chart=new Chart(employeeChart,{
type:'bar',
data:{labels:Object.keys(c),
datasets:[{data:Object.values(c),backgroundColor:'#2563eb'}]}
});
}

/* RENDER */
function render(){
const d=applyFilters();
const p=d.filter(r=>getStatus(r)==='pending');
const c=d.filter(r=>getStatus(r)==='complete');

pendingCount.textContent=p.length;
completedCount.textContent=c.length;

pendingTable.innerHTML=buildTable(p);
completedTable.innerHTML=buildTable(c);

counters.innerHTML=`
<div class="col-4"><div class="counter-card bg-pending">Pending<div class="big-number">${p.length}</div></div></div>
<div class="col-4"><div class="counter-card bg-complete">Done<div class="big-number">${c.length}</div></div></div>
<div class="col-4"><div class="counter-card bg-total">Total<div class="big-number">${d.length}</div></div></div>
`;

renderChart(d);
}

/* EXPORT */
function exportExcel(){
let csv="";
fullData.forEach(r=>csv+=Object.values(r).join(",")+"\n");
const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="files.csv";
a.click();
}

/* SLIDESHOW */
let slideIndex=0, slideTimer, running=true;

function showSlide(i){
pendingSection.style.display="none";
completedSection.style.display="none";
chartSection.style.display="none";

if(i===0) pendingSection.style.display="block";
if(i===1) completedSection.style.display="block";
if(i===2) chartSection.style.display="block";
}

function startSlideshow(){
slideTimer=setInterval(()=>{
slideIndex=(slideIndex+1)%3;
showSlide(slideIndex);
},5000);
}

function toggleSlideshow(){
if(running){
clearInterval(slideTimer);
pendingSection.style.display="block";
completedSection.style.display="block";
chartSection.style.display="block";
running=false;
}else{
startSlideshow();
running=true;
}
}

/* INIT */
load();
setInterval(load,120000);
startSlideshow();  // ✅ AUTO START

</script>

</body>
</html>
