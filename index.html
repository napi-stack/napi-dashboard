<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napi Office Dillibazaar - File Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .counter-card { text-align: center; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .big-number { font-size: 4.8rem; font-weight: 800; line-height: 1; margin: 10px 0; }
        h1 { color: #1e3a8a; }
        .table th { background-color: #f1f3f5; font-weight: 600; }
        .date-col { font-weight: 500; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container py-4">
        <h1 class="text-center mb-1">नापी कार्यालय डिल्लीबजार</h1>
        <h2 class="text-center mb-4 text-muted">File Tracking Dashboard</h2>
        
        <div id="lastUpdated" class="text-center mb-4" style="color:#666; font-size:0.9rem;"></div>

        <div class="row g-4 mb-5" id="counters"></div>

        <h3 class="text-warning mb-3">📌 Pending Files (<span id="pendingCount">0</span>)</h3>
        <div class="table-responsive mb-5" id="pendingTable"></div>

        <hr>

        <h3 class="text-success mb-3">✅ Completed Files (<span id="completedCount">0</span>)</h3>
        <div class="table-responsive" id="completedTable"></div>
    </div>

    <script>
        // Your Google Sheet ID
        const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
        const SHEET_NAME = "Sheet1";   // Change only if your sheet name is different

        function formatDartaMiti(value) {
            if (!value) return "";
            if (typeof value === 'number') {
                const utc_days = Math.floor(value - 25569);
                const date = new Date(utc_days * 86400 * 1000);
                const day = date.getDate();
                const month = date.getMonth() + 1;
                const year = date.getFullYear();
                return `${day}/${month}/${year}`;
            }
            return String(value).trim();
        }

        async function loadDashboard() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                const response = await fetch(url);
                const csvText = await response.text();
                
                // Parse CSV
                const workbook = XLSX.read(csvText, { type: 'string' });
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                const pending = data.filter(r => 
                    String(r['कामको अवस्था'] || '').toLowerCase().includes('pend')
                );
                const completed = data.filter(r => 
                    String(r['कामको अवस्था'] || '').toLowerCase().includes('comp')
                );

                // Big Counters
                document.getElementById('counters').innerHTML = `
                    <div class="col-md-4">
                        <div class="card counter-card bg-warning text-dark">
                            <div class="card-body"><h5>📌 PENDING FILES</h5><div class="big-number">${pending.length}</div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card counter-card bg-success text-white">
                            <div class="card-body"><h5>✅ COMPLETED FILES</h5><div class="big-number">${completed.length}</div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card counter-card bg-info text-white">
                            <div class="card-body"><h5>📊 TOTAL FILES</h5><div class="big-number">${data.length}</div></div>
                        </div>
                    </div>
                `;

                document.getElementById('pendingCount').textContent = pending.length;
                document.getElementById('completedCount').textContent = completed.length;

                // Pending Table
                let pHTML = `<table class="table table-striped table-hover"><thead class="table-warning"><tr>
                    <th>निवेदन दर्ता नं.</th><th>विषय</th><th>निवेदकको नाम थर</th><th>फाटवाला कर्मचारी</th><th>दर्ता मिति</th>
                </tr></thead><tbody>`;
                pending.forEach(r => {
                    pHTML += `<tr>
                        <td>${r['निवेदन दर्ता नं.'] || ''}</td>
                        <td>${r['विषय'] || ''}</td>
                        <td>${r['निवेदकको नाम थर'] || ''}</td>
                        <td>${r['फाटवाला कर्मचारी'] || ''}</td>
                        <td class="date-col">${formatDartaMiti(r['दर्ता मिति'])}</td>
                    </tr>`;
                });
                pHTML += `</tbody></table>`;
                document.getElementById('pendingTable').innerHTML = pending.length ? pHTML : "<p>No pending files.</p>";

                // Completed Table
                let cHTML = `<table class="table table-striped table-hover"><thead class="table-success"><tr>
                    <th>निवेदन दर्ता नं.</th><th>विषय</th><th>निवेदकको नाम थर</th><th>फाटवाला कर्मचारी</th><th>दर्ता मिति</th>
                </tr></thead><tbody>`;
                completed.forEach(r => {
                    cHTML += `<tr>
                        <td>${r['निवेदन दर्ता नं.'] || ''}</td>
                        <td>${r['विषय'] || ''}</td>
                        <td>${r['निवेदकको नाम थर'] || ''}</td>
                        <td>${r['फाटवाला कर्मचारी'] || ''}</td>
                        <td class="date-col">${formatDartaMiti(r['दर्ता मिति'])}</td>
                    </tr>`;
                });
                cHTML += `</tbody></table>`;
                document.getElementById('completedTable').innerHTML = completed.length ? cHTML : "<p>No completed files yet.</p>";

                document.getElementById('lastUpdated').innerHTML = 
                    `Last updated: ${new Date().toLocaleString('en-US', {hour12: true})}`;

            } catch (e) {
                console.error(e);
                document.getElementById('pendingTable').innerHTML = `
                    <div class="alert alert-danger">
                        Error loading Google Sheet.<br>
                        Make sure the sheet is published to the web (Anyone with the link can view).
                    </div>`;
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);   // Refresh every 30 seconds
    </script>
</body>
</html>
