<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napi Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bikram-sambat-js"></script>

<style>

body {
    margin:0;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(135deg,#1e3a8a,#0ea5e9);
    font-family:'Segoe UI';
}

/* HEADER */
.header {
    height:70px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color:white;
    padding:10px 20px;
}

/* CLOCK */
#liveClock {
    font-size:0.9rem;
    text-align:right;
}

/* MAIN */
.dashboard {
    height: calc(100vh - 70px);
    padding:15px;
}

/* PANEL */
.panel {
    background:white;
    border-radius:15px;
    padding:15px;
    height:100%;
    display:flex;
    flex-direction:column;
}

/* COUNTERS */
.counter-card {
    text-align:center;
    padding:10px;
    border-radius:10px;
    color:white;
}
.big-number { font-size:1.8rem; font-weight:800; }

.bg-pending { background:#f59e0b; }
.bg-complete { background:#16a34a; }
.bg-total { background:#2563eb; }

/* TABLE */
.table-container {
    flex:1;
    overflow:auto;
}

.table {
    background:#1e293b;
    color:#e2e8f0;
}

.table thead {
    position:sticky;
    top:0;
    background:#0f172a;
    color:white;
}

.table tbody tr:nth-child(odd){ background:#334155; }
.table tbody tr:nth-child(even){ background:#475569; }

.table tbody tr:hover {
    background:#0ea5e9 !important;
}

/* BADGES */
.badge-pending { background:#f59e0b; }
.badge-complete { background:#16a34a; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">नापी कार्यालय डिल्लीबजार</h5>
        <small>Smart File Dashboard</small>
    </div>
    <div id="liveClock"></div>
</div>

<!-- DASHBOARD -->
<div class="container-fluid dashboard">
<div class="row h-100">

<!-- LEFT -->
<div class="col-md-8 h-100">
<div class="panel">

<div class="row mb-2">
    <div class="col-md-6">
        <input id="search" class="form-control" placeholder="🔍 Search">
    </div>
    <div class="col-md-3">
        <select id="employeeFilter" class="form-select"></select>
    </div>
    <div class="col-md-3 d-flex gap-2">
        <button class="btn btn-success w-100" onclick="exportExcel()">📥</button>
        <button class="btn btn-dark w-100" onclick="window.print()">🖨️</button>
    </div>
</div>

<div id="counters" class="row g-2 mb-2"></div>

<h6 class="text-warning">📌 Pending (<span id="pendingCount"></span>)</h6>
<div class="table-container" id="pendingTable"></div>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-4 h-100">
<div class="panel">

<h6>📊 Files by Employee</h6>
<canvas id="employeeChart"></canvas>

<hr>

<h6 class="text-success">Completed (<span id="completedCount"></span>)</h6>
<div class="table-container" id="completedTable"></div>

</div>
</div>

</div>
</div>

<script>

const SHEET_ID = "1qvFhUaRIriIDLOqSU-Ua8U1608x0aBM-UcO32KtiXOk";
let fullData=[];
let chart;

/* CLOCK */
function updateClock(){
    const now = new Date();
    const bs = NepaliDate.fromAD(now);
    document.getElementById("liveClock").innerHTML =
        `${bs.format('YYYY/MM/DD')}<br>${now.toLocaleTimeString()}`;
}
setInterval(updateClock,1000);

/* DATE FORMAT */
function formatDate(value){
    if(!value) return "";
    if(!isNaN(value)){
        const d = new Date((value - 25569) * 86400 * 1000);
        return d.toLocaleDateString();
    }
    return value;
}

/* CSV */
function parseCSV(text){
    const rows=text.split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
    const headers=rows[0];

    return rows.slice(1).map(r=>{
        let obj={};
        headers.forEach((h,i)=> obj[h.trim()] = (r[i]||"").replace(/"/g,''));
        return obj;
    });
}

/* LOAD */
function load(){
    fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
    .then(r=>r.text())
    .then(csv=>{
        fullData=parseCSV(csv);
        setupFilters();
        render();
    });
}

/* FILTER */
function setupFilters(){
    const emp=[...new Set(fullData.map(r=>r['फाटवाला कर्मचारी']).filter(Boolean))];
    employeeFilter.innerHTML =
        `<option value="">All Employees</option>` +
        emp.map(e=>`<option>${e}</option>`).join("");
}

function applyFilters(){
    const k=search.value.toLowerCase();
    const e=employeeFilter.value;

    return fullData.filter(r=>{
        const t = Object.values(r).some(v=>String(v).toLowerCase().includes(k));
        const m = !e || r['फाटवाला कर्मचारी']===e;
        return t && m;
    });
}

/* STATUS */
function getStatus(r){
    const s=(r['कामको अवस्था']||'').toLowerCase();
    if(s.includes('pend')) return 'pending';
    if(s.includes('comp')) return 'complete';
}

/* TABLE */
function buildTable(data){
    let html=`<table class="table">
    <thead><tr>
    <th>दर्ता नं.</th>
    <th>विषय</th>
    <th>नाम</th>
    <th>कर्मचारी</th>
    <th>दर्ता मिति</th>
    <th>स्थिति</th>
    </tr></thead><tbody>`;

    data.forEach(r=>{
        const st=getStatus(r);
        const badge=st==='pending'
            ? '<span class="badge badge-pending">Pending</span>'
            : '<span class="badge badge-complete">Done</span>';

        html+=`<tr>
        <td>${r['निवेदन दर्ता नं.']||''}</td>
        <td>${r['विषय']||''}</td>
        <td>${r['निवेदकको नाम थर']||''}</td>
        <td>${r['फाटवाला कर्मचारी']||''}</td>
        <td>${formatDate(r['दर्ता मिति'])}</td>
        <td>${badge}</td>
        </tr>`;
    });

    return html+"</tbody></table>";
}

/* CHART */
function renderChart(data){
    if(chart) chart.destroy();

    const count={};
    data.forEach(r=>{
        const e=r['फाटवाला कर्मचारी']||'Unknown';
        count[e]=(count[e]||0)+1;
    });

    chart=new Chart(employeeChart,{
        type:'bar',
        data:{
            labels:Object.keys(count),
            datasets:[{
                data:Object.values(count),
                backgroundColor:'#2563eb'
            }]
        }
    });
}

/* RENDER */
function render(){
    const data=applyFilters();
    const pending=data.filter(r=>getStatus(r)==='pending');
    const completed=data.filter(r=>getStatus(r)==='complete');

    pendingCount.textContent=pending.length;
    completedCount.textContent=completed.length;

    pendingTable.innerHTML=buildTable(pending);
    completedTable.innerHTML=buildTable(completed);

    counters.innerHTML=`
    <div class="col-4"><div class="counter-card bg-pending">Pending<div class="big-number">${pending.length}</div></div></div>
    <div class="col-4"><div class="counter-card bg-complete">Done<div class="big-number">${completed.length}</div></div></div>
    <div class="col-4"><div class="counter-card bg-total">Total<div class="big-number">${data.length}</div></div></div>
    `;

    renderChart(data);
}

/* EXPORT */
function exportExcel(){
    let csv="";
    fullData.forEach(r=> csv+=Object.values(r).join(",")+"\n");

    const blob=new Blob([csv]);
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="files.csv";
    a.click();
}

/* EVENTS */
search.oninput=render;
employeeFilter.onchange=render;

/* INIT */
load();
setInterval(load,120000);

</script>

</body>
</html>
